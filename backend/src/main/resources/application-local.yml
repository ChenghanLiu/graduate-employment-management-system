spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:employment_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    hikari:
      connection-init-sql:
  sql:
    init:
      enabled: true
      mode: always
      schema-locations: classpath:schema-local.sql
      data-locations: classpath:data-local.sql

logging:
  level:
    com.example.employment: info
